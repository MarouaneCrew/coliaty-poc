version: "3.8"
services:
  db:
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coliaty"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: coliaty
      POSTGRES_USER: coliaty
      POSTGRES_PASSWORD: coliaty123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://coliaty:coliaty123@db:5432/coliaty
      GEOCODER_PROVIDER: nominatim
      NODE_ENV: development
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      db:
        condition: service_healthy
  
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - api

volumes:
  pgdata: